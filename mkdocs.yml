site_name: 信源日报
site_description: 每日8公众号聚合分析 + 宏观共振 + 海外映射
site_author: 小草 & 小潘潘
repo_url: https://github.com/xiao-panpan729/daily-reports
repo_name: daily-reports

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md

extra:
  generator: false

extra_css:
  - stylesheets/custom.css

copyright: "量化交易信号系统 — 每日信源日报"
